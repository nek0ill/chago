image: golang:1.24.3

stages:
  - prepare
  - build
  - test
  - build-monitoring
  - deploy

variables:
  GOFLAGS: "-mod=vendor"
  DOCKER_BUILDKIT: 1

prepare:
  stage: prepare
  script:
    - mkdir -p scripts
    - cat > ./scripts/test_metrics.sh << 'EOF'
      #!/bin/bash
      set -eo pipefail
      
      [ -f ./bin/chago ] || { echo "Build binary first!"; exit 1; }
      
      TEST_KEY="test-$(date +%s)"
      PORT=$(( (RANDOM % 5000) + 8000 ))
      METRICS_PORT=$((PORT + 1))
      
      ./bin/chago server --port $PORT --metrics-port $METRICS_PORT --key "$TEST_KEY" &
      SERVER_PID=$!
      trap "kill $SERVER_PID" EXIT
      sleep 3
      
      curl --retry 3 --retry-delay 1 -s "http://localhost:$METRICS_PORT/metrics" | grep -q "chat_" || exit 1
      
      echo "Metrics test passed"
      exit 0
      EOF
    - chmod +x ./scripts/test_metrics.sh
  artifacts:
    paths:
      - scripts/

build:
  stage: build
  script:
    - go build -o bin/chago .
  artifacts:
    paths:
      - bin/

test:
  stage: test
  dependencies:
    - prepare
    - build
  script:
    - ./scripts/test_metrics.sh
    - go test -v ./...

build-monitoring:
  stage: build-monitoring
  needs: ["test"]
  script:
    - docker-compose -f monitoring/docker-compose.yml config
    - docker-compose -f monitoring/docker-compose.yml build

deploy:
  stage: deploy
  script:
    - echo "$DOCKER_REGISTRY_PASSWORD" | docker login --username "$DOCKER_REGISTRY_USER" --password-stdin
    - docker-compose -f monitoring/docker-compose.yml push
    - echo "Deploying monitoring stack..."
    # Add your actual deployment commands here
    - kubectl apply -f monitoring/k8s/
  only:
    - main
