image: golang:1.24.3

stages:
  - build
  - test
  - build-monitoring
  - deploy

variables:
  GOFLAGS: "-mod=vendor"

before_script:
  - go mod download
  - mkdir -p scripts
  
  # Create test_metrics.sh if not present
  - |
    if [ ! -f ./scripts/test_metrics.sh ]; then
      cat > ./scripts/test_metrics.sh << 'EOF'
      #!/bin/bash
      set -eo pipefail
      
      if [ ! -f ./bin/chago ]; then
        echo "Server binary not found - build first!"
        exit 1
      fi
      
      PORT=$((RANDOM % 1000 + 8000))
      ./bin/chago server --port $PORT --metrics-port $((PORT+1)) --key test-key &
      SERVER_PID=$!
      sleep 2
      
      if ! curl --retry 5 --retry-delay 2 -s "http://localhost:$((PORT+1))/metrics" | grep -q "chat_"; then
        kill $SERVER_PID
        exit 1
      fi
      
      kill $SERVER_PID
      echo "Metrics test passed"
      exit 0
      EOF
      chmod +x ./scripts/test_metrics.sh
    fi

build:
  stage: build
  script:
    - go build -o bin/chago .
  artifacts:
    paths:
      - bin/
      - scripts/

test:
  stage: test
  dependencies:
    - build
  script:
    - ./scripts/test_metrics.sh
    - go test -v ./...

build-monitoring:
  stage: build-monitoring
  script:
    - docker-compose -f monitoring/docker-compose.yml config
    - docker-compose -f monitoring/docker-compose.yml build
  needs: ["test"]

deploy:
  stage: deploy
  script:
    - echo "$DOCKER_REGISTRY_PASSWORD" | docker login --username "$DOCKER_REGISTRY_USER" --password-stdin
    - docker-compose -f monitoring/docker-compose.yml push
    - echo "Deploying monitoring stack..."
    - kubectl apply -f monitoring/k8s/
  only:
    - main
